version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: adsuite-db
    environment:
      POSTGRES_DB: adsuite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: adsuite-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: adsuite
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: your_jwt_secret_change_in_production
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ../Invoke-ADSuiteScan.ps1:/app/scripts/Invoke-ADSuiteScan.ps1
      - ../Modules:/app/scripts/Modules

  frontend:
    build: ./frontend
    container_name: adsuite-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
